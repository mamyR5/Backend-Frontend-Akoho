<!-- 
  SIDEBAR COMPACT — PoultryManager
-->
<aside
  class="h-full bg-space-950 flex flex-col shadow-2xl z-10 relative transition-all duration-300 ease-in-out"
  [class.w-64]="!isCollapsed()"
  [class.w-16]="isCollapsed()">

  <!-- ═══════════════════════════════ LOGO ═══════════════════════════════ -->
  <div class="h-20 flex items-center px-5 border-b border-white/5 relative">
    <div
      class="w-8 h-8 rounded-full bg-gold-400 shadow-[0_0_15px_rgba(250,204,21,0.5)] flex-shrink-0 flex items-center justify-center text-black font-extrabold text-sm">
      P
    </div>

    @if (!isCollapsed()) {
      <h1
        class="ml-3 text-lg font-bold text-white tracking-wide leading-tight whitespace-nowrap overflow-hidden">
        Poultry<span class="text-gold-400">Manager</span>
      </h1>
    }

    <button
      (click)="toggle()"
      class="absolute -right-3 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-space-950 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white hover:border-gold-400/50 transition-all duration-200 shadow-lg">
      <svg xmlns="http://www.w3.org/2000/svg"
        class="h-3 w-3 transition-transform duration-300"
        [class.rotate-180]="isCollapsed()"
        fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15 19l-7-7 7-7" />
      </svg>
    </button>
  </div>

  <!-- ══════════════════════════ NAVIGATION ══════════════════════════════ -->
  @for (group of navGroups; track group.title) {
  <div class="mx-2 my-4 mb-2">

    @if(!isCollapsed()){
    <!-- Titre de groupe -->
    <p
      class="px-3 mb-1 text-[10px] font-semibold text-gray-600 uppercase tracking-widest">
      {{ group.title }}
    </p>
    }

    <!-- Items du groupe -->
    @for (item of group.items; track item.label) {
    <app-nav-item
      [label]="item.label"
      [icon]="item.icon"
      [route]="item.route || ''"
      [collapsed]="isCollapsed()"
      (collapseChanged)="isCollapsed.set($event)"
      [children]="item.children">
    </app-nav-item>
    }

  </div>

  <!-- Séparateur entre groupes (sauf le dernier) -->
  @if (!$last) {
  <hr class="border-white/5 mb-4" />
  }
  }

</aside>
