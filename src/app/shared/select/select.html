<div class="relative" (clickOutside)="close()">

  <!-- Trigger -->
  <button type="button"
          (click)="toggle()"
          class="w-full flex items-center justify-between gap-3 px-4 py-2.5 rounded-xl border text-sm transition-all duration-200 focus:outline-none focus:ring-1"
          [class.bg-white/5]="!isDisabled"
          [class.bg-white/2]="isDisabled"
          [class.cursor-not-allowed]="isDisabled"
          [class.opacity-50]="isDisabled"
          [class.border-white/10]="!invalid && !isOpen"
          [class.border-gold-400]="!invalid && isOpen"
          [class.ring-gold-400/20]="!invalid && isOpen"
          [class.border-red-500/50]="invalid"
          [class.ring-red-500/20]="invalid && isOpen">

    <!-- Valeur sélectionnée ou placeholder -->
    <span [class.text-white]="selectedOption"
          [class.text-gray-600]="!selectedOption">
      {{ selectedOption ? selectedOption.label : placeholder }}
    </span>

    <!-- Chevron -->
    <svg xmlns="http://www.w3.org/2000/svg"
         class="h-3.5 w-3.5 shrink-0 text-gray-500 transition-transform duration-200"
         [class.rotate-180]="isOpen"
         fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  <!-- Dropdown -->
  <div class="absolute z-50 w-full mt-1.5 overflow-hidden transition-all duration-200"
       [class.opacity-0]="!isOpen"
       [class.pointer-events-none]="!isOpen"
       [class.opacity-100]="isOpen"
       [class.translate-y-0]="isOpen"
       [class.-translate-y-1]="!isOpen">

    <div class="bg-space-950 border border-white/10 rounded-xl shadow-2xl overflow-hidden">
      @for (option of options; track option.value) {
        <button type="button"
                (click)="select(option)"
                class="w-full flex items-center justify-between px-4 py-2.5 text-sm transition-colors duration-150 hover:bg-white/5 cursor-pointer"
                [class.text-gold-400]="selectedOption?.value === option.value"
                [class.text-gray-300]="selectedOption?.value !== option.value">

          {{ option.label }}

          <!-- Check si sélectionné -->
          @if (selectedOption?.value === option.value) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          }
        </button>
      }
    </div>
  </div>

</div>
