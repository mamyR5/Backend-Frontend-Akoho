<div class="flex flex-col gap-1.5">

  <!-- Label -->
  @if (label) {
    <label class="text-xs font-medium text-gray-400 uppercase tracking-wider">
      {{ label }}
      @if (required) {
        <span class="text-gold-400 ml-0.5">*</span>
      }
    </label>
  }

  <!-- Wrapper input -->
  <div class="relative flex items-center">

    <!-- Icône gauche selon le type -->
    <div class="absolute left-3.5 pointer-events-none">
      @if (type === 'date') {
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-3.5 w-3.5 transition-colors duration-200"
             [class.text-gold-400]="isFocused"
             [class.text-gray-600]="!isFocused"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      }
      @if (type === 'number') {
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-3.5 w-3.5 transition-colors duration-200"
             [class.text-gold-400]="isFocused"
             [class.text-gray-600]="!isFocused"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/>
        </svg>
      }
      @if (type === 'text') {
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-3.5 w-3.5 transition-colors duration-200"
             [class.text-gold-400]="isFocused"
             [class.text-gray-600]="!isFocused"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      }
    </div>

    <!-- Input natif caché derrière notre style -->
    <input
      [type]="type"
      [placeholder]="placeholder"
      [value]="value ?? ''"
      [disabled]="isDisabled"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      class="w-full bg-white/5 border rounded-xl pl-9 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-1 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed"
      [class.pr-12]="suffix"
      [class.pr-4]="!suffix"
      [class.border-white/10]="!invalid && !isFocused"
      [class.border-gold-400]="!invalid && isFocused"
      [class.ring-gold-400/20]="!invalid && isFocused"
      [class.border-red-500/50]="invalid"
      [class.ring-red-500/20]="invalid && isFocused"
    />

    <!-- Suffix (Ar, kg...) -->
    @if (suffix) {
      <span class="absolute right-3.5 text-xs pointer-events-none transition-colors duration-200"
            [class.text-gold-400]="isFocused"
            [class.text-gray-500]="!isFocused">
        {{ suffix }}
      </span>
    }
  </div>

  <!-- Message d'erreur -->
  @if (invalid && errorMessage) {
    <span class="text-xs text-red-400 flex items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {{ errorMessage }}
    </span>
  }

</div>
