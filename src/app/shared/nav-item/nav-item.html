<div>
    @if (children.length === 0) {
    <div
        class="group w-full mb-1 flex items-center gap-2.5 px-3 py-2 text-gray-400 hover:text-white hover:bg-white/5 transition-all duration-200 rounded-full cursor-pointer text-[14.2px] relative group/tooltip">
        <a [routerLink]="route" class="flex gap-2.5 items-center" (click)="toggleSideBar()">
            <svg xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 shrink-0 group-hover:drop-shadow-[0_0_4px_rgba(250,204,21,0.8)]"
                fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    [attr.d]="icon" />
            </svg>
            @if(collapsed==false){
            <span class="font-medium flex-1 text-left">{{ label }}</span>
            }
        </a>
    </div>
    }

    @if (children.length > 0) {
    <button
        (click)="toggleSideBar()"
        [class.text-gold-400]="isOpen"
        class="group w-full mb-1 flex items-center gap-2.5 px-3 py-2 text-gray-400 hover:text-white hover:bg-white/5 transition-all duration-200 rounded-full cursor-pointer text-[14.2px]">
        <svg xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4 shrink-0 group-hover:drop-shadow-[0_0_4px_rgba(250,204,21,0.8)]"
            fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                [attr.d]="icon" />
        </svg>
        @if(collapsed==false){
        <span class="font-medium flex-1 text-left">{{ label }}</span>
        <svg xmlns="http://www.w3.org/2000/svg"
            class="h-3 w-3 shrink-0 transition-transform duration-200"
            [class.rotate-180]="isOpen"
            fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 9l-7 7-7-7" />
        </svg>
        }
    </button>

    @if(collapsed==false){
            <div
                class="ml-4 mt-0.5 border-l border-white/10 pl-2 space-y-0.5 overflow-hidden transition-all duration-300 ease-in-out"
                [style.max-height]="isOpen ? '500px' : '0px'"
                [style.opacity]="isOpen ? '1' : '0'">
                @for (child of children; track child.route) {
                <a [routerLink]="child.route"
                    routerLinkActive="text-gold-400 hover:"
                    class="flex items-center gap-2 px-2 py-1.5 text-gray-500 hover:text-white hover:bg-white/5 transition-all duration-150 rounded-full cursor-pointer text-[12.8px]">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-3.5 w-3.5 shrink-0"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            [attr.d]="child.icon" />
                    </svg>
                    <span>{{ child.label }}</span>
                </a>
                }
            </div>
        }
    }
</div>
